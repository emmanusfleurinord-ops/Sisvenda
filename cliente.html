<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente | CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 40px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-cliente { background: #6f42c1; color: white; padding: 20px; border-radius: 12px 12px 0 0; }
        .section-title { font-size: 0.9rem; text-transform: uppercase; color: #6c757d; font-weight: bold; margin-top: 20px; border-bottom: 1px solid #dee2e6; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card">
                <div class="header-cliente">
                    <h4 class="mb-0">Novo Cadastro de Cliente</h4>
                </div>
                <div class="card-body p-4">
                    <form id="formCliente">
                        
                        <p class="section-title">Dados Básicos</p>
                        <div class="row g-3">
                            <div class="col-md-7">
                                <label for="nome" class="form-label">Nome Completo / Razão Social</label>
                                <input type="text" class="form-control" id="nome" required>
                            </div>
                            <div class="col-md-5">
                                <label for="documento" class="form-label">CPF / CNPJ</label>
                                <input type="text" class="form-control" id="documento" placeholder="000.000.000-00">
                            </div>
                        </div>

                        <div class="row g-3 mt-1">
                            <div class="col-md-6">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="exemplo@email.com">
                            </div>
                            <div class="col-md-6">
                                <label for="telefone" class="form-label">Telefone / WhatsApp</label>
                                <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                            </div>
                        </div>

                        <p class="section-title">Endereço</p>
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label for="cep" class="form-label">CEP</label>
                                <input type="text" class="form-control" id="cep">
                            </div>
                            <div class="col-md-7">
                                <label for="logradouro" class="form-label">Rua/Logradouro</label>
                                <input type="text" class="form-control" id="logradouro">
                            </div>
                            <div class="col-md-2">
                                <label for="numero" class="form-label">Nº</label>
                                <input type="text" class="form-control" id="numero">
                            </div>
                        </div>

                        <div class="row g-3 mt-1">
                            <div class="col-md-5">
                                <label for="bairro" class="form-label">Bairro</label>
                                <input type="text" class="form-control" id="bairro">
                            </div>
                            <div class="col-md-5">
                                <label for="cidade" class="form-label">Cidade</label>
                                <input type="text" class="form-control" id="cidade">
                            </div>
                            <div class="col-md-2">
                                <label for="uf" class="form-label">UF</label>
                                <input type="text" class="form-control" id="uf" maxlength="2">
                            </div>
                        </div>

                        <div class="mt-4 pt-3 d-flex justify-content-between">
                            <button type="reset" class="btn btn-outline-danger">Descartar</button>
                            <button type="submit" class="btn btn-purple btn-lg text-white" style="background-color: #6f42c1;">Finalizar Cadastro</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
