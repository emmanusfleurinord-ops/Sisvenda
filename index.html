<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: bold;
            color: #764ba2;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .btn-login {
            background: #764ba2;
            border: none;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #5a377d;
            transform: translateY(-2px);
        }
        .footer-text {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">
        <i class="bi bi-cpu"></i> Gestão Pro
    </div>
    
    <h5 class="text-center mb-4 text-secondary">Acesse sua conta</h5>
    
    <form id="loginForm">
        <div class="mb-3">
            <label for="email" class="form-label">Usuário ou E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="admin@sistema.com" required>
        </div>
        
        <div class="mb-3">
            <div class="d-flex justify-content-between">
                <label for="password" class="form-label">Senha</label>
                <a href="#" class="text-decoration-none small" style="color: #764ba2;">Esqueceu?</a>
            </div>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label" for="remember">Lembrar de mim</label>
        </div>

        <div class="d-grid">
            <button type="button" onclick="location.href='financeiro.html'" class="btn btn-primary btn-login py-2">
                Entrar no Sistema
            </button>
        </div>
    </form>

    <div class="footer-text">
        &copy; 2026 - Todos os direitos reservados.
    </div>
</div>

</body>
</html>
