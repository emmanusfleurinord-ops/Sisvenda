<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Venda | Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-venda { background: #212529; color: white; padding: 15px; border-radius: 5px 5px 0 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="header-venda text-center">
                    <h4>Nova Venda</h4>
                </div>
                <div class="card-body p-4">
                    <form id="formVenda">
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label for="cliente" class="form-label">Nome do Cliente</label>
                                <input type="text" class="form-control" id="cliente" placeholder="Ex: João Silva" required>
                            </div>
                            <div class="col-md-4">
                                <label for="data" class="form-label">Data da Venda</label>
                                <input type="date" class="form-control" id="data" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="produto" class="form-label">Produto/Serviço</label>
                                <select class="form-select" id="produto">
                                    <option selected>Selecione...</option>
                                    <option value="1">Consultoria</option>
                                    <option value="2">Licença de Software</option>
                                    <option value="3">Manutenção</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="quantidade" class="form-label">Qtd.</label>
                                <input type="number" class="form-control" id="quantidade" min="1" value="1">
                            </div>
                            <div class="col-md-3">
                                <label for="valor" class="form-label">Valor Unit.</label>
                                <input type="number" class="form-control" id="valor" step="0.01" placeholder="0,00">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Forma de Pagamento</label>
                                <select class="form-select" id="pagamento">
                                    <option value="pix">PIX</option>
                                    <option value="cartao">Cartão de Crédito</option>
                                    <option value="boleto">Boleto</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <select class="form-select" id="status">
                                    <option value="pago" class="text-success">Pago</option>
                                    <option value="pendente" class="text-warning">Pendente</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">Registrar Venda</button>
                            <button type="reset" class="btn btn-outline-secondary btn-sm">Limpar Campos</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
